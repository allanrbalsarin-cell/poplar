function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [senha, setSenha] = useState("");
  const [err, setErr] = useState("");

  function handle(e) {
    e.preventDefault();
    if (!email || !senha) { setErr("Preencha todos os campos."); return; }
    if (email === "admin@poplar.com.br" && senha === "123456") {
      onLogin({ nome:"Allan Sarin", email, avatar:"AS", cargo:"Corretor Sênior" });
    } else {
      setErr("Credenciais inválidas. Use admin@poplar.com.br / 123456");
    }
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-emerald-900 via-emerald-800 to-teal-900 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

          <h1 className="text-2xl font-bold text-gray-900">PopLar CRM</h1>
          <p className="text-gray-400 text-sm mt-1">Gestão Imobiliária Inteligente</p>
        </div>
        <form onSubmit={handle} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}

      </div>
    </div>
  );
}

function DonutChart({ data }) {
  const total = data.reduce((s,d)=>s+d.value,0);
  let offset = 0;
  const r = 40, cx = 60, cy = 60, circumference = 2*Math.PI*r;
  const segments = data.map(d=>{
    const pct = d.value/total;
    const dash = pct*circumference;
    const seg = {color:d.color, dash, offset, name:d.name, value:d.value};
    offset += dash;
    return seg;
  });
  return (
    <div className="flex items-center gap-4">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f3f4f6" strokeWidth="18"/>
        {segments.map((s,i)=>(
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="18"
            strokeDasharray={`${s.dash} ${circumference-s.dash}`}
            strokeDashoffset={-s.offset+circumference/4}
            style={{transition:"stroke-dasharray 0.5s"}} />
        ))}
      </svg>
      <div className="grid grid-cols-1 gap-1">
        {data.map(d=>(

// ─── LEADS KANBAN ─────────────────────────────────────────────────────────────

const COLS = ["Novo","Contato","Visita Agendada","Proposta","Fechado","Perdido"];

function LeadsKanban({ leads, setLeads }) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const empty = { nome:"", email:"", telefone:"", origem:"Site", status:"Novo", imovel:"", valor:"", notas:"" };
  const [form, setForm] = useState(empty);

  const fil = leads.filter(l=>
    l.nome.toLowerCase().includes(search.toLowerCase()) ||
    l.imovel.toLowerCase().includes(search.toLowerCase())
  );
  const byCol = col => fil.filter(l=>l.status===col);

  function openNew() { setForm(empty); setEditId(null); setModal(true); }
  function openEdit(l) { setForm({...l}); setEditId(l.id); setModal(true); }
  function save() {
    if (!form.nome.trim()) return;
    if (editId) setLeads(leads.map(l=>l.id===editId?{...l,...form}:l));
    else setLeads([...leads,{...form,id:Date.now(),data:new Date().toISOString().slice(0,10)}]);
    setModal(false);
  }
  function del() {
    if (editId && window.confirm("Remover este lead?")) { setLeads(leads.filter(l=>l.id!==editId)); setModal(false); }
  }

  return (
    <div className="p-6 fade-in flex flex-col" style={{height:"calc(100vh - 57px)"}}>
      <div className="flex items-center gap-3 mb-4 flex-shrink-0">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar lead..."
          className="border border-gray-300 rounded-lg px-3 py-2 text-sm w-64" />
        <span className="text-sm text-gray-500">{leads.length} leads</span>
        <button onClick={openNew} className="ml-auto bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-2 rounded-lg font-medium">
          + Novo Lead
        </button>
      </div>
      <div className="flex gap-4 overflow-x-auto flex-1 kanban-scroll">
        {COLS.map(col=>(
          <div key={col} className="flex-shrink-0 w-60">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-semibold text-gray-600 uppercase tracking-wide">{col}</span>
              <Badge text={byCol(col).length} color={sc(col)} />
            </div>
            <div className="space-y-2">
              {byCol(col).map(l=>(
                <div key={l.id} onClick={()=>openEdit(l)}
                  className="bg-white rounded-xl border border-gray-200 p-3.5 cursor-pointer card-hover">
                  <p className="font-semibold text-gray-900 text-sm leading-tight">{l.nome}</p>
                  <p className="text-xs text-gray-500 mt-1">{l.imovel}</p>
                  <p className="text-xs font-bold text-emerald-700 mt-2">{l.valor}</p>
                  <div className="flex items-center justify-between mt-2">
                    <span className="text-xs text-gray-400">{l.origem}</span>
                    <span className="text-xs text-gray-400">{l.data}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      {modal && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl">
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-bold text-lg">{editId?"Editar Lead":"Novo Lead"}</h2>
              {editId && <button onClick={del} className="text-red-500 hover:text-red-700 text-sm">Remover</button>}
            </div>
            <div className="grid grid-cols-2 gap-3">
              {[["Nome","nome"],["Telefone","telefone"],["Email","email","col-span-2"],
                ["Imóvel de Interesse","imovel","col-span-2"],["Valor Estimado","valor"]].map(([lbl,key,cls])=>(
                <div key={key} className={cls||""}>
                  <label className="block text-xs font-medium text-gray-600 mb-1">{lbl}</label>
                  <input value={form[key]||""} onChange={e=>setForm({...form,[key]:e.target.value})}
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
                </div>
              ))}
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Origem</label>
                <select value={form.origem} onChange={e=>setForm({...form,origem:e.target.value})}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                  {["Site","Instagram","Indicação","Portais","Google","WhatsApp","Outros"].map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Status</label>
                <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                  {COLS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div className="col-span-2">
                <label className="block text-xs font-medium text-gray-600 mb-1">Notas</label>
                <textarea value={form.notas||""} onChange={e=>setForm({...form,notas:e.target.value})}
                  rows={2} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none" />
              </div>
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={()=>setModal(false)}
                className="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg text-sm hover:bg-gray-50">Cancelar</button>
              <button onClick={save}
                className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-sm font-semibold">Salvar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    <div className="p-6 fade-in space-y-6">

                  <span className="font-semibold text-gray-900 text-sm">{e.titulo}</span>

  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [copied, setCopied] = useState(false);
  const [bairroErr, setBairroErr] = useState(false);

  const bairros = CIDADES_BAIRROS[form.cidade] || [];

  function sf(k,v) {
    if (k==="cidade") setForm(f=>({...f,cidade:v,bairro:""}));
    else setForm(f=>({...f,[k]:v}));
  }

  async function gerar(e) {
    e.preventDefault();
    if (!form.bairro.trim()) { setBairroErr(true); return; }
    setBairroErr(false); setErr(""); setLoading(true); setResult(null);
    try {
      const res = await fetch("/api/gerar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(form)});
      const txt = await res.text();
      let data;
      try { data = JSON.parse(txt); }
      catch { const m=txt.match(/\{[\s\S]*\}/); if(m) data=JSON.parse(m[0]); else throw new Error(txt.slice(0,120)); }
      if (data.error) throw new Error(data.error);
      setResult(data);
    } catch(ex) { setErr("Erro: "+ex.message); }
    finally { setLoading(false); }
  }

  function copy() {
    if (!result) return;
    navigator.clipboard.writeText(result.anuncio||"");
    setCopied(true); setTimeout(()=>setCopied(false),2000);
  }

  return (
    <div className="p-6 fade-in max-w-2xl">
      <div className="bg-white rounded-xl border border-gray-200 p-6">
        <p className="text-sm text-gray-500 mb-5">Preencha os dados do imóvel e gere um anúncio profissional automaticamente.</p>
        <form onSubmit={gerar} className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Tipo</label>
              <select value={form.tipo} onChange={e=>sf("tipo",e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                {["Apartamento","Casa","Studio","Cobertura","Terreno","Sala Comercial","Loja"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Cidade</label>
              <select value={form.cidade} onChange={e=>sf("cidade",e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                {CIDADES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">
                Bairro {bairroErr&&<span className="text-red-500 ml-1">*obrigatório</span>}
              </label>
              <input value={form.bairro} onChange={e=>{sf("bairro",e.target.value);setBairroErr(false);}}
                list="bl" placeholder="Digite ou selecione"
                className={`w-full border rounded-lg px-3 py-2 text-sm ${bairroErr?"border-red-400 bg-red-50":"border-gray-300"}`} />
              <datalist id="bl">{bairros.map(b=><option key={b} value={b}/>)}</datalist>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Área (m²)</label>
              <input value={form.area} onChange={e=>sf("area",e.target.value.replace(/\D/g,""))}
                placeholder="Ex: 85" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
            </div>
            {["quartos","banheiros","vagas"].map(f=>(
              <div key={f}>
                <label className="block text-xs font-medium text-gray-600 mb-1 capitalize">{f}</label>
                <select value={form[f]} onChange={e=>sf(f,e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                  {["0","1","2","3","4","5+"].map(n=><option key={n}>{n}</option>)}
                </select>
              </div>
            ))}
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Valor</label>
              <input value={form.valor} onChange={e=>sf("valor",e.target.value)}
                placeholder="Ex: 850.000" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Tom</label>
              <select value={form.tom} onChange={e=>sf("tom",e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                {["profissional","descontraído","luxuoso","acessível","urgente"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Plataforma</label>
              <select value={form.plataforma} onChange={e=>sf("plataforma",e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                {["Instagram","Facebook","WhatsApp","OLX","ZAP Imóveis","Viva Real","Site"].map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-medium text-gray-600 mb-1">Diferenciais</label>
              <input value={form.diferenciais} onChange={e=>sf("diferenciais",e.target.value)}
                placeholder="Ex: piscina, churrasqueira, vista para o mar, recém reformado..."
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
            </div>
          </div>
          {err&&<p className="text-red-600 text-sm bg-red-50 border border-red-200 rounded-lg p-3">{err}</p>}
          <button type="submit" disabled={loading}
            className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
            {loading?"✨ Gerando anúncio...":"✨ Gerar Anúncio com IA"}
          </button>
        </form>
      </div>
      {result&&(
        <div className="mt-4 bg-white rounded-xl border border-emerald-200 p-6">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-semibold text-gray-900">Anúncio Gerado</h3>
            <button onClick={copy}
              className={`text-sm px-3 py-1.5 rounded-lg font-medium transition-colors ${copied?"bg-green-100 text-green-700":"bg-gray-100 text-gray-700 hover:bg-gray-200"}`}>
              {copied?"✓ Copiado!":"📋 Copiar"}
            </button>
          </div>
          <div className="bg-gray-50 rounded-lg p-4 whitespace-pre-wrap text-sm text-gray-800 leading-relaxed border border-gray-100">
            {result.anuncio}
          </div>
          {result.hashtags&&<p className="text-sm text-emerald-600 mt-3">{result.hashtags}</p>}
          {result.dica&&
            <div className="mt-3 bg-blue-50 border border-blue-100 rounded-lg p-3">
              <p className="text-xs text-blue-700">💡 {result.dica}</p>
            </div>}
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [user, setUser]     = useState(null);
  const [view, setView]     = useState("dashboard");
  const [col, setCol]       = useState(false);
  const [leads, setLeads]   = useState(MOCK_LEADS);
  const [contatos]          = useState(MOCK_CONTATOS);
  const [imoveis]           = useState(MOCK_IMOVEIS);
  const [notifs, setNotifs] = useState(MOCK_NOTIFS);

  const naoLidas = notifs.filter(n=>!n.lida).length;

  if (!user) return <Login onLogin={setUser} />;

  function renderView() {
    switch(view) {
      case "dashboard":    return <Dashboard leads={leads} imoveis={imoveis} />;
      case "leads":        return <LeadsKanban leads={leads} setLeads={setLeads} />;
      case "contatos":     return <Contatos contatos={contatos} />;
      case "imoveis":      return <Imoveis imoveis={imoveis} />;
      case "agenda":       return <Agenda />;
      case "atendimentos": return <Atendimentos />;
      case "anuncio":      return <GerarAnuncio />;
      case "notificacoes": return <Notificacoes notifs={notifs} setNotifs={setNotifs} />;
      default: return null;
    }
  }

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar view={view} setView={setView} user={user} naoLidas={naoLidas} col={col} setCol={setCol} />
      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <Topbar view={view} naoLidas={naoLidas} setView={setView} onLogout={()=>setUser(null)} />
        <main className="flex-1 overflow-y-auto">{renderView()}</main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
